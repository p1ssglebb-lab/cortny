<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTEX // Neural Systems</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background-color: #030303; color: #ffffff; overflow-x: hidden; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 30px 10%; position: fixed; width: 100%; top: 0; z-index: 100; transition: 0.4s; }
        .navbar.scrolled { background: rgba(3,3,3,0.8); backdrop-filter: blur(10px); padding: 15px 10%; border-bottom: 1px solid #222; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: 5px; color: #fff; text-decoration: none; }
        .nav-links a { color: #555; text-decoration: none; margin-left: 30px; font-size: 13px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: #fff; }

        .hero { height: 100vh; display: flex; align-items: center; padding: 0 10%; }
        .hero h1 { font-size: 60px; margin-bottom: 20px; }
        .btn { padding: 15px 30px; cursor: pointer; text-transform: uppercase; border: none; font-weight: 600; margin-right: 20px; }
        .btn-primary { background: #fff; color: #000; }

        /* Терминал - Фикс верстки */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .terminal-box { background: #070707; border: 1px solid #00ffcc; width: 400px; padding: 30px; border-radius: 8px; display: flex; flex-direction: column; gap: 15px; }
        .terminal-header { color: #00ffcc; font-size: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .terminal-input { width: 100%; padding: 12px; background: #030303; border: 1px solid #333; color: #fff; border-radius: 4px; }
    </style>
</head>
<body>

    <header class="navbar" id="navbar">
        <a href="#" class="logo">VERTEX</a>
        <nav class="nav-links">
            <a href="#services">Протоколы</a>
            <a href="#contact">Связь</a>
            <a href="#" id="navTerminalBtn">Терминал</a>
        </nav>
    </header>

    <main class="hero">
        <div>
            <h1>Интеллект высшего порядка.</h1>
            <p>VERTEX создает закрытые нейросетевые экосистемы.</p>
            <div style="margin-top: 30px;">
                <button class="btn btn-primary" id="heroInitBtn">Инициализировать</button>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="terminalModal">
        <div class="terminal-box">
            <div class="terminal-header"><span>ACCESS TERMINAL V1.0.9</span> <span id="closeModal" style="cursor:pointer">✕</span></div>
            <input type="text" class="terminal-input" id="termUser" placeholder="ID ОПЕРАТОРА (admin)">
            <input type="password" class="terminal-input" id="termPass" placeholder="КВАНТОВЫЙ КЛЮЧ (1234)">
            <button class="btn btn-primary" id="termSubmit">Установить соединение</button>
            <div id="termLog" style="color: #fff; font-size: 12px; margin-top: 10px;"></div>
        </div>
    </div>

    <script>
        const modal = document.getElementById('terminalModal');
        const openModal = () => modal.classList.add('active');
        const closeModal = () => modal.classList.remove('active');

        document.getElementById('heroInitBtn').onclick = openModal;
        document.getElementById('navTerminalBtn').onclick = openModal;
        document.getElementById('closeModal').onclick = closeModal;

        document.getElementById('termSubmit').onclick = () => {
            const user = document.getElementById('termUser').value;
            const pass = document.getElementById('termPass').value;
            const log = document.getElementById('termLog');
            if(user === 'admin' && pass === '1234') {
                log.innerText = '> СИНХРОНИЗАЦИЯ УСПЕШНА';
                log.style.color = '#00ffcc';
            } else {
                log.innerText = '> ОШИБКА ДОСТУПА';
                log.style.color = '#ff3355';
            }
        };

        window.onscroll = () => document.getElementById('navbar').className = window.scrollY > 50 ? 'navbar scrolled' : 'navbar';
    </script>
</body>
</html>
