<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTEX // Access Granted</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #030303; color: #ffffff; }
        
        /* ШАПКА */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 30px 10%; position: fixed; width: 100%; z-index: 100; }
        .logo { font-size: 22px; font-weight: 900; letter-spacing: 5px; color: #fff; text-decoration: none; }
        .nav-links a { color: #555; text-decoration: none; margin-left: 40px; font-size: 13px; text-transform: uppercase; }
        
        /* ГЕРОЙ */
        .hero { height: 100vh; display: flex; align-items: center; padding: 0 10%; }
        h1 { font-size: 64px; margin-bottom: 30px; }
        .btn { padding: 18px 38px; font-size: 13px; text-transform: uppercase; border: none; cursor: pointer; font-weight: 600; background: #fff; color: #000; transition: 0.3s; }
        .btn:hover { background: #00ffcc; }

        /* ТЕРМИНАЛ И ПАНЕЛЬ АДМИНИСТРАТОРА */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .terminal-box { background: #070707; border: 1px solid #00ffcc; width: 400px; padding: 30px; border-radius: 6px; }
        .terminal-input { width: 100%; padding: 12px; margin-bottom: 10px; background: #030303; border: 1px solid #333; color: #fff; }
        #adminPanel { display: none; text-align: center; }
        #adminPanel h3 { color: #00ffcc; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="#" class="logo">VERTEX</a>
        <nav class="nav-links">
            <a href="#">Протоколы</a>
            <a href="#" id="navTerminalBtn">Терминал</a>
        </nav>
    </header>

    <main class="hero">
        <div>
            <h1>Интеллект высшего порядка.</h1>
            <p>Система защиты активна. Вход разрешен только авторизованным узлам.</p>
            <button class="btn" id="heroInitBtn">Инициализировать</button>
        </div>
    </main>

    <div class="modal-overlay" id="terminalModal">
        <div class="terminal-box" id="loginBox">
            <div style="color: #00ffcc; margin-bottom: 15px; font-size: 11px;">ACCESS TERMINAL V1.0.9</div>
            <input type="text" class="terminal-input" id="termUser" placeholder="ID ОПЕРАТОРА (admin)">
            <input type="password" class="terminal-input" id="termPass" placeholder="КВАНТОВЫЙ КЛЮЧ (1234)">
            <button class="btn" style="width: 100%" id="termSubmit">ПОДКЛЮЧИТЬСЯ</button>
            <div id="termLog" style="color: #ff3355; font-size: 12px; margin-top: 10px;"></div>
        </div>

        <!-- Секретная панель (появляется после входа) -->
        <div class="terminal-box" id="adminPanel">
            <h3>ДОСТУП ПОДТВЕРЖДЕН</h3>
            <p style="margin-bottom: 20px; color: #777; font-size: 14px;">Система CORE-9 ожидает команды:</p>
            <button class="btn" style="width: 100%; margin-bottom: 10px;" onclick="alert('Загрузка протоколов... 100%')">ЗАГРУЗИТЬ ПРОТОКОЛЫ</button>
            <button class="btn" style="width: 100%; background: #333; color: #fff;" onclick="location.reload()">ВЫЙТИ</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('terminalModal');
        const loginBox = document.getElementById('loginBox');
        const adminPanel = document.getElementById('adminPanel');

        document.getElementById('heroInitBtn').onclick = () => modal.classList.add('active');
        document.getElementById('navTerminalBtn').onclick = () => modal.classList.add('active');

        document.getElementById('termSubmit').onclick = () => {
            if(document.getElementById('termUser').value === 'admin' && document.getElementById('termPass').value === '1234') {
                loginBox.style.display = 'none';
                adminPanel.style.display = 'block';
            } else {
                document.getElementById('termLog').innerText = '> ОШИБКА: Доступ запрещен';
            }
        };
    </script>
</body>
</html>
