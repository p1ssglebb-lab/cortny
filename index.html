<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERTEX // Neural Systems</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;900&display=swap');
        
        :root { --accent: #00ffcc; --bg: #030303; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Фоновая сетка */
        body::before { content: ""; position: fixed; top:0; left:0; width:100%; height:100%; background-image: radial-gradient(#00ffcc0a 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }

        /* Навигация */
        .navbar { padding: 40px 10%; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Space Mono', monospace; font-size: 24px; font-weight: 700; color: var(--accent); letter-spacing: 5px; }
        
        /* Главный экран */
        .hero { height: 100vh; display: flex; align-items: center; padding: 0 10%; }
        h1 { font-size: 80px; text-transform: uppercase; line-height: 0.9; margin-bottom: 30px; }
        .btn { padding: 20px 40px; background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; font-family: 'Space Mono'; transition: 0.4s; }
        .btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 30px var(--accent); }

        /* Терминал */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000e; display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .box { background: #0a0a0a; border: 1px solid var(--accent); width: 400px; padding: 40px; position: relative; }
        .input { width: 100%; background: #000; border: 1px solid #333; padding: 15px; color: var(--accent); margin-bottom: 10px; font-family: 'Space Mono'; }
        #adminPanel { display: none; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">VERTEX</div>
        <button class="btn" onclick="openModal()">TERMINAL_ACCESS</button>
    </nav>

    <main class="hero">
        <div>
            <h1>NEURAL<br>SYSTEMS</h1>
            <button class="btn" onclick="openModal()">ИНИЦИАЛИЗАЦИЯ</button>
        </div>
    </main>

    <div class="modal" id="modal">
        <div class="box" id="loginBox">
            <div style="font-size: 10px; color: var(--accent); margin-bottom: 20px;">// SYSTEM_AUTH_REQUIRED</div>
            <input type="text" class="input" id="u" placeholder="OPERATOR_ID">
            <input type="password" class="input" id="p" placeholder="QUANTUM_KEY">
            <button class="btn" style="width: 100%" onclick="check()">LOGIN</button>
            <div id="log" style="color: #ff3355; font-size: 11px; margin-top: 10px;"></div>
        </div>
        <div class="box" id="adminPanel">
            <h2 style="font-family: 'Space Mono'; margin-bottom: 20px;">ACCESS GRANTED</h2>
            <button class="btn" style="width: 100%; margin-bottom: 10px;" onclick="alert('DATA_STREAM: ACTIVE')">LOAD_NEURAL_DATA</button>
            <button class="btn" style="width: 100%; border-color: #ff3355; color: #ff3355;" onclick="location.reload()">DISCONNECT</button>
        </div>
    </div>

    <script>
        const m = document.getElementById('modal');
        const openModal = () => m.classList.add('active');
        
        function check() {
            if(document.getElementById('u').value === 'admin' && document.getElementById('p').value === '1234') {
                document.getElementById('log').innerText = '> SYNCHRONIZING...';
                document.getElementById('log').style.color = '#00ffcc';
                setTimeout(() => {
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                }, 1000);
            } else {
                document.getElementById('log').innerText = '> ERROR: ACCESS_DENIED';
            }
        }
    </script>
</body>
</html>
